{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block extra_css %}
<style>
    .error-page {
        min-height: calc(100vh - 70px);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        background: linear-gradient(135deg, #721c24, #dc3545);
        color: white;
    }
    .error-content i {
        font-size: 6rem;
        margin-bottom: 1.5rem;
        animation: pulse 2s ease-in-out infinite;
    }
    .error-content h1 {
        font-family: 'Poppins', sans-serif;
        font-size: 4rem;
        margin-bottom: 0.5rem;
    }
    .error-content h2 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        opacity: 0.9;
    }
    .error-content p {
        opacity: 0.7;
        margin-bottom: 2rem;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
    }
</style>
{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-content animate-fadeInUp">
        <i class="fas fa-triangle-exclamation"></i>
        <h1>500</h1>
        <h2>Server Error</h2>
        <p>Something went wrong on our end. Please try again later or contact support if the problem persists.</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg" style="background: white; color: #dc3545;">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
